name: Write Novel (Grok via 9router)

on:
  workflow_dispatch:
    inputs:
      stage_name:
        description: 'Stage name (e.g. cung1, ch13-25)'
        required: true
        default: 'cung1'
      max_chapters:
        description: 'Max chapters this job (8-15 recommended)'
        required: true
        default: '12'
      prompt:
        description: 'Initial prompt (leave empty to resume from last artifact)'
        required: false
        default: ''
      model:
        description: 'Model via 9router (e.g. xai/grok-4, xai/grok-code-fast-1)'
        required: true
        default: 'xai/grok-code-fast-1'

permissions:
  contents: write
  packages: write

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download previous workspace (resume nếu có)
        uses: actions/download-artifact@v4
        with:
          name: novel-workspace-${{ github.event.inputs.stage_name }}
          path: workspace
          merge-multiple: true
        continue-on-error: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build ainovel-cli binary
        run: |
          go build -trimpath -ldflags="-s -w" -o /usr/local/bin/ainovel-cli ./cmd/ainovel-cli
          echo "✅ Built ainovel-cli OK"
          ainovel-cli --version 2>/dev/null || ainovel-cli --help 2>/dev/null | head -3 || true

      - name: Inject 9router config (từ secret, không hardcode)
        run: |
          mkdir -p $HOME/.ainovel
          cat > $HOME/.ainovel/config.json << EOF
          {
            "provider": "9router-grok",
            "model": "${{ github.event.inputs.model }}",
            "providers": {
              "9router-grok": {
                "type": "openai",
                "api_key": "${{ secrets.NINE_ROUTER_API_KEY }}",
                "base_url": "https://9router.dieuhau.xyz/v1"
              }
            },
            "roles": {
              "coordinator": { "provider": "9router-grok", "model": "${{ github.event.inputs.model }}" },
              "architect":   { "provider": "9router-grok", "model": "${{ github.event.inputs.model }}" },
              "writer":      { "provider": "9router-grok", "model": "${{ github.event.inputs.model }}" },
              "editor":      { "provider": "9router-grok", "model": "${{ github.event.inputs.model }}" }
            },
            "style": "default"
          }
          EOF
          echo "✅ Config injected: model=${{ github.event.inputs.model }}"

      - name: Verify 9router connection
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.NINE_ROUTER_API_KEY }}" \
            https://9router.dieuhau.xyz/v1/models)
          echo "9router /v1/models status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ 9router not reachable (status $STATUS) — continuing anyway"
          else
            echo "✅ 9router online"
          fi

      - name: Run ainovel-cli headless (Grok via 9router)
        run: |
          mkdir -p workspace
          MAX_CH="${{ github.event.inputs.max_chapters }}"
          PROMPT="${{ github.event.inputs.prompt }}"

          if [ -z "$PROMPT" ]; then
            PROMPT="Tiếp tục viết tiểu thuyết. Viết thêm tối đa ${MAX_CH} chương nữa rồi dừng lại. Giữ nguyên phong cách, nhân vật, cốt truyện đã có."
            echo "📌 Resume mode — prompt tự động"
          else
            PROMPT="${PROMPT}. Viết tối đa ${MAX_CH} chương."
            echo "📌 New stage — prompt từ input"
          fi

          echo "Model: ${{ github.event.inputs.model }}"
          echo "Max chapters: $MAX_CH"
          echo "Stage: ${{ github.event.inputs.stage_name }}"

          # Ghi prompt ra file để tránh shell escaping issues
          echo "$PROMPT" > /tmp/novel-prompt.txt

          # Chạy headless: --prompt-file để tránh lỗi shell quoting
          # KHÔNG truyền positional args (gây lỗi "không còn hỗ trợ")
          ainovel-cli \
            --headless \
            --prompt-file /tmp/novel-prompt.txt \
            2>&1 | tee /tmp/ainovel-run.log || true

          echo "✅ Run complete"

          # Copy output (ainovel lưu trong ~/.ainovel/<hash>/) sang workspace
          find $HOME/.ainovel -name "*.md" -newer /tmp/novel-prompt.txt 2>/dev/null \
            | head -200 \
            | xargs -I{} cp {} workspace/ 2>/dev/null || true
          echo "Files copied to workspace: $(ls workspace/ | wc -l)"

      - name: Count chapters written
        id: count
        run: |
          COUNT=$(find workspace -name "*.md" 2>/dev/null | wc -l || echo 0)
          echo "📊 Chapters/files in workspace: $COUNT"
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          # Show first few files
          find workspace -name "*.md" 2>/dev/null | head -10 || true

      - name: Upload workspace artifact (resume support)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: novel-workspace-${{ github.event.inputs.stage_name }}
          path: workspace
          retention-days: 30
          overwrite: true

      - name: Upload chapters backup (90 ngày)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: novel-chapters-${{ github.event.inputs.stage_name }}-${{ github.run_number }}
          path: workspace
          retention-days: 90

      - name: Upload run log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-log-${{ github.event.inputs.stage_name }}-${{ github.run_number }}
          path: /tmp/ainovel-run.log
          retention-days: 7

      - name: Summary
        run: |
          echo "## ✅ Stage **${{ github.event.inputs.stage_name }}** completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`${{ github.event.inputs.model }}\` via 9router |" >> $GITHUB_STEP_SUMMARY
          echo "| Max chapters | ${{ github.event.inputs.max_chapters }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Files written | ${{ steps.count.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
